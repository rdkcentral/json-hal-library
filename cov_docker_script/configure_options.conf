# ======================================================================
# JSON-HAL-LIBRARY - Configure Options
# Clean and corrected version for CMake integration
# ======================================================================

# ======================================================================
# CPPFLAGS - Preprocessor flags (includes and defines)
# ======================================================================
[CPPFLAGS]
-I$HOME/usr/include/rdkb/
-I/usr/include/dbus-1.0
-I/usr/lib/x86_64-linux-gnu/dbus-1.0/include
-I$HOME/usr/include/rdkb/json-c

-DCMAKE_BUILD_TYPE=Release
-DBUILD_SHARED_LIBS=ON

# ======================================================================
# CFLAGS - Compiler flags
# ======================================================================
[CFLAGS]
-ffunction-sections
-fdata-sections
-fomit-frame-pointer
-fno-strict-aliasing
-Wno-stringop-truncation
-Wno-error=stringop-truncation
-Wno-error=discarded-qualifiers

# ======================================================================
# LDFLAGS - Linker flags
# NOTE:
#   * No -I flags here (these belong to CPPFLAGS)
#   * rpath syntax fixed
#   * No dangling -Wl entries
# ======================================================================
[LDFLAGS]
-L$HOME/usr/local/lib
-L$HOME/usr/lib/x86_64-linux-gnu
-L$HOME/usr/lib

# RPATH settings
-Wl,-rpath,$HOME/usr/local/lib
-Wl,-rpath,$HOME/usr/lib

# Allow unresolved symbols (only if truly required)
-Wl,--allow-shlib-undefined
-Wl,--unresolved-symbols=ignore-all
